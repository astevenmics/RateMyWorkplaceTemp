<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rants — MyWorkTea</title>
    <meta name="description" content="Anonymous, non-company-specific work rants — no account needed to read or post.">
    <script>(function(){var t=localStorage.getItem("rmw-theme")||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <!-- Google AdSense: replace data-ad-client / data-ad-slot
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    -->
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:6px">
            <div>
                <h2 style="margin:0 0 4px">Rants</h2>
                <p class="subtitle" style="margin:0">Anonymous, non-company-specific work rants — no account needed to read or post. Want to
                    call out a specific workplace instead? <a href="/workplaces.html">Browse workplaces</a> (requires
                    verifying your employment there).</p>
            </div>
            <button class="btn" type="button" id="openRantModalBtn">+ Post a Rant</button>
        </div>

        <div class="ad-slot ad-banner" style="margin-top:18px">
            <div><strong>Advertisement</strong><br>Google AdSense slot<br><span style="font-size:.78rem">(728×90 / responsive)</span></div>
        </div>

        <div class="toolbar" id="sortTabs" style="margin-top:22px">
            <button class="btn small" type="button" data-sort="createdAt,desc">Most Recent</button>
            <button class="btn small secondary" type="button" data-sort="upvotes,desc">Most Upvoted</button>
            <button class="btn small secondary" type="button" data-sort="downvotes,desc">Most Downvoted</button>
        </div>

        <div class="grid" id="rantFeed" style="margin-top:14px"><div class="spinner">Loading…</div></div>
        <div class="pagination" id="pagination"></div>
    </div>
</section>

<dialog id="rantModal" class="modal">
    <div class="modal-card">
        <div class="modal-head">
            <h3>Post a rant</h3>
            <button type="button" class="modal-close" id="closeRantModal" aria-label="Close">✕</button>
        </div>
        <div id="rantAlert" class="alert"></div>
        <form id="rantForm">
            <div class="field">
                <textarea name="body" rows="4" required maxlength="2000" placeholder="What's going on at work? Get it off your chest — totally anonymous." autofocus></textarea>
            </div>
            <div class="field"><input type="text" name="nickname" maxlength="40" placeholder="Nickname (optional, defaults to Anonymous)"></div>
            <button class="btn" type="submit" style="width:100%">Post anonymously</button>
        </form>
    </div>
</dialog>

<dialog id="rantDetailModal" class="modal">
    <div class="modal-card">
        <div class="modal-head">
            <h3 id="rantDetailMeta">Anonymous</h3>
            <button type="button" class="modal-close" id="closeRantDetailModal" aria-label="Close">✕</button>
        </div>
        <p id="rantDetailBody" style="white-space:pre-wrap;overflow-wrap:anywhere;margin:0 0 16px"></p>
        <div class="vote-group" id="rantDetailVotes"></div>
    </div>
</dialog>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
    let page = 0;
    let sort = 'createdAt,desc';
    const RANT_TRUNCATE_AT = 220;

    async function load() {
        const box = document.getElementById('rantFeed');
        box.innerHTML = '<div class="spinner">Loading…</div>';
        try {
            const data = await RMW.api(`/api/rants?page=${page}&size=20&sort=${sort}&voterId=${encodeURIComponent(RMW.anonId())}`);
            const items = data.content || [];
            if (!items.length) { box.innerHTML = '<p class="muted">No rants yet — be the first to vent!</p>'; document.getElementById('pagination').innerHTML = ''; return; }
            box.innerHTML = items.map(rantCard).join('');
            renderPagination(data);
        } catch (e) {
            box.innerHTML = `<p class="muted">${RMW.escapeHtml(e.message)}</p>`;
        }
    }

    document.getElementById('sortTabs').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-sort]');
        if (!btn) return;
        sort = btn.dataset.sort;
        page = 0;
        document.querySelectorAll('#sortTabs [data-sort]').forEach(b => b.classList.toggle('secondary', b !== btn));
        window.scrollTo({ top: 0, behavior: 'smooth' });
        load();
    });

    function rantCard(r) {
        const truncated = r.body.length > RANT_TRUNCATE_AT;
        return `<div class="card rant-card" data-id="${r.id}"
              data-nickname="${RMW.escapeHtml(r.nickname || 'Anonymous')}" data-created="${RMW.escapeHtml(RMW.fmtDate(r.createdAt))}">
            <p class="rant-body${truncated ? ' clamped' : ''}">${RMW.escapeHtml(r.body)}</p>
            ${truncated ? '<div class="rant-more">Read more →</div>' : ''}
            <div class="rant-footer">
              <span class="muted" style="font-size:.82rem">— ${RMW.escapeHtml(r.nickname || 'Anonymous')} · ${RMW.fmtDate(r.createdAt)}</span>
              <div class="vote-group" data-votes>${voteButtons(r)}</div>
            </div>
          </div>`;
    }

    function voteButtons(r) {
        return `<button type="button" class="vote-btn up${r.myVote === 'UP' ? ' active' : ''}" data-vote="UP">▲ ${r.upvotes}</button>
          <button type="button" class="vote-btn down${r.myVote === 'DOWN' ? ' active' : ''}" data-vote="DOWN">▼ ${r.downvotes}</button>`;
    }

    async function castVote(id, type) {
        try {
            const dto = await RMW.api(`/api/rants/${id}/vote`, { method: 'POST', body: { type, voterId: RMW.anonId() } });
            document.querySelectorAll(`.rant-card[data-id="${id}"] [data-votes]`).forEach(el => { el.innerHTML = voteButtons(dto); });
            const detailVotes = document.getElementById('rantDetailVotes');
            if (detailVotes.dataset.id === String(id)) detailVotes.innerHTML = voteButtons(dto);
        } catch (e) {
            RMW.showToast(e.message, 'error');
        }
    }

    // ---- rant detail modal (full text; truncated cards only show a preview) ----
    const rantDetailModal = document.getElementById('rantDetailModal');
    function openRantDetail(card) {
        document.getElementById('rantDetailMeta').textContent = `${card.dataset.nickname} · ${card.dataset.created}`;
        document.getElementById('rantDetailBody').textContent = card.querySelector('.rant-body').textContent;
        const votesBox = document.getElementById('rantDetailVotes');
        votesBox.dataset.id = card.dataset.id;
        votesBox.innerHTML = card.querySelector('[data-votes]').innerHTML;
        rantDetailModal.showModal();
    }
    document.getElementById('closeRantDetailModal').addEventListener('click', () => rantDetailModal.close());
    rantDetailModal.addEventListener('click', (e) => { if (e.target === rantDetailModal) rantDetailModal.close(); });
    document.getElementById('rantDetailVotes').addEventListener('click', (e) => {
        const voteBtn = e.target.closest('[data-vote]');
        if (voteBtn) castVote(document.getElementById('rantDetailVotes').dataset.id, voteBtn.dataset.vote);
    });

    document.getElementById('rantFeed').addEventListener('click', (e) => {
        const card = e.target.closest('.rant-card');
        if (!card) return;
        const voteBtn = e.target.closest('[data-vote]');
        if (voteBtn) { e.stopPropagation(); castVote(card.dataset.id, voteBtn.dataset.vote); return; }
        openRantDetail(card);
    });

    function renderPagination(data) {
        const pag = document.getElementById('pagination');
        const total = data.page.totalPages, cur = data.page.number;
        if (total <= 1) { pag.innerHTML = ''; return; }
        let html = `<button ${cur === 0 ? 'disabled' : ''} data-p="${cur - 1}">‹ Prev</button>`;
        for (let i = 0; i < total; i++) html += `<button class="${i === cur ? 'active' : ''}" data-p="${i}">${i + 1}</button>`;
        html += `<button ${cur >= total - 1 ? 'disabled' : ''} data-p="${cur + 1}">Next ›</button>`;
        pag.innerHTML = html;
        pag.querySelectorAll('button[data-p]').forEach(b => b.addEventListener('click', () => { page = parseInt(b.dataset.p, 10); window.scrollTo({ top: 0, behavior: 'smooth' }); load(); }));
    }

    // ---- post-a-rant modal ----
    const rantModal = document.getElementById('rantModal');
    const rantForm = document.getElementById('rantForm');
    document.getElementById('openRantModalBtn').addEventListener('click', () => {
        RMW.clearToast(document.getElementById('rantAlert'));
        rantForm.reset();
        rantModal.showModal();
    });
    document.getElementById('closeRantModal').addEventListener('click', () => rantModal.close());
    rantModal.addEventListener('click', (e) => { if (e.target === rantModal) rantModal.close(); });

    rantForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertEl = document.getElementById('rantAlert');
        const form = e.target;
        const btn = form.querySelector('button[type="submit"]');
        RMW.clearToast(alertEl);
        RMW.setLoading(btn, true, 'Posting…');
        try {
            await RMW.api('/api/rants', { method: 'POST', body: {
                    nickname: form.nickname.value.trim() || null,
                    body: form.body.value.trim()
                }});
            rantModal.close();
            RMW.showToast('Posted! Thanks for sharing.', 'success');
            page = 0;
            load();
        } catch (err) {
            let msg = err.message;
            if (err.data && err.data.fieldErrors) msg = Object.values(err.data.fieldErrors).join(' ');
            RMW.toast(alertEl, 'error', msg);
        } finally {
            RMW.setLoading(btn, false);
        }
    });

    load();
</script>
</body>
</html>
