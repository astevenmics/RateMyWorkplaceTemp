<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your account — RateMyWorkplace</title>
  <script>(function(){var t=localStorage.getItem("rmw-theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
  <div class="container">
    <div class="card form-card">
      <h2 style="margin-top:0">Verify your account</h2>
      <p class="subtitle">Enter the code sent to your email.</p>
      <div id="alert" class="alert"></div>

      <div id="emailBlock" class="field">
        <label>Email verification <span id="emailStatus" class="badge pending">Pending</span></label>
        <div class="field-row">
          <div class="field" style="margin:0"><input type="text" id="emailCode" placeholder="6-digit code"></div>
          <button class="btn secondary" id="verifyEmailBtn" type="button">Verify</button>
          <button class="btn ghost" id="resendEmailBtn" type="button">Resend</button>
        </div>
      </div>

      <div id="done" class="alert success" style="margin-top:18px">
        🎉 Your account is fully verified. <a href="/index.html">Continue →</a>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
  const alertEl = document.getElementById('alert');

  async function refresh() {
    const user = await RMW.currentUser(true);
    if (!user) { window.location.href = '/login.html?next=/verify.html'; return; }
    setStatus(user.emailVerified);
    document.getElementById('done').className = user.fullyVerified ? 'alert success show' : 'alert success';
  }

  const COOLDOWN_MS = 5 * 60 * 1000; // resend allowed every 5 minutes
  let verified = false;
  let timer = null;

  function setStatus(ok) {
    verified = ok;
    const el = document.getElementById('emailStatus');
    el.textContent = ok ? 'Verified' : 'Pending';
    el.className = 'badge ' + (ok ? 'approved' : 'pending');
    document.getElementById('emailBlock').style.opacity = ok ? '0.6' : '1';

    const verifyBtn = document.getElementById('verifyEmailBtn');
    const codeInput = document.getElementById('emailCode');
    if (ok) {
      // Once verified, lock the section so no more codes/attempts can be sent.
      verifyBtn.disabled = true;
      codeInput.disabled = true;
      clearInterval(timer);
      const resendBtn = document.getElementById('resendEmailBtn');
      resendBtn.disabled = true;
      resendBtn.textContent = 'Verified';
    } else {
      verifyBtn.disabled = false;
      codeInput.disabled = false;
      refreshCooldown();
    }
  }

  const COOLDOWN_KEY = 'rmw-resend-email';

  function refreshCooldown() {
    if (verified) return;
    const resendBtn = document.getElementById('resendEmailBtn');
    clearInterval(timer);
    const tick = () => {
      const started = parseInt(localStorage.getItem(COOLDOWN_KEY) || '0', 10);
      const remaining = started + COOLDOWN_MS - Date.now();
      if (remaining > 0) {
        const m = Math.floor(remaining / 60000), s = Math.floor((remaining % 60000) / 1000);
        resendBtn.disabled = true;
        resendBtn.textContent = `Resend in ${m}:${String(s).padStart(2, '0')}`;
      } else {
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend';
        clearInterval(timer);
      }
    };
    tick();
    timer = setInterval(tick, 1000);
  }

  async function verify(code) {
    if (!code.trim()) { RMW.toast(alertEl, 'error', 'Enter the code first.'); return; }
    try {
      await RMW.api('/api/auth/verify', { method: 'POST', body: { code: code.trim() } });
      RMW.toast(alertEl, 'success', 'Email verified!');
      await refresh();
    } catch (err) { RMW.toast(alertEl, 'error', err.message); }
  }

  async function resend() {
    try {
      await RMW.api('/api/auth/verify/resend', { method: 'POST' });
      localStorage.setItem(COOLDOWN_KEY, String(Date.now()));
      refreshCooldown();
      RMW.toast(alertEl, 'info', 'A new code was sent (check the server log in dev mode). You can resend again in 5 minutes.');
    } catch (err) { RMW.toast(alertEl, 'error', err.message); }
  }

  document.getElementById('verifyEmailBtn').addEventListener('click', () => verify(document.getElementById('emailCode').value));
  document.getElementById('resendEmailBtn').addEventListener('click', resend);

  refresh();
</script>
</body>
</html>
