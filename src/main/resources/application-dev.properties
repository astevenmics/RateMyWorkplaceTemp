# Run with:  mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Uses an in-memory H2 database so you can try the app without installing MySQL.
spring.datasource.url=jdbc:h2:mem:ratemyworkplace;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
app.mail.enabled=false
