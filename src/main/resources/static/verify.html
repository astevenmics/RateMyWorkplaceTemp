<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your account — RateMyWorkplace</title>
  <script>(function(){var t=localStorage.getItem("rmw-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <section class="section">
    <div class="container">
      <div class="card form-card">
        <h2 style="margin-top:0">Verify your account</h2>
        <p class="subtitle">Enter the codes sent to your email and phone. (In dev mode, codes are printed to the server log.)</p>
        <div id="alert" class="alert"></div>

        <div id="emailBlock" class="field">
          <label>Email verification <span id="emailStatus" class="badge pending">Pending</span></label>
          <div class="field-row">
            <div class="field" style="margin:0"><input type="text" id="emailCode" placeholder="6-digit code"></div>
            <button class="btn secondary" id="verifyEmailBtn" type="button">Verify</button>
            <button class="btn ghost" id="resendEmailBtn" type="button">Resend</button>
          </div>
        </div>

        <div id="phoneBlock" class="field" style="margin-top:18px">
          <label>Phone verification <span id="phoneStatus" class="badge pending">Pending</span></label>
          <div class="field-row">
            <div class="field" style="margin:0"><input type="text" id="phoneCode" placeholder="6-digit code"></div>
            <button class="btn secondary" id="verifyPhoneBtn" type="button">Verify</button>
            <button class="btn ghost" id="resendPhoneBtn" type="button">Resend</button>
          </div>
        </div>

        <div id="done" class="alert success" style="margin-top:18px">
          🎉 Your account is fully verified. <a href="/index.html">Continue →</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/app.js"></script>
  <script>
    const alertEl = document.getElementById('alert');

    async function refresh() {
      const user = await RMW.currentUser(true);
      if (!user) { window.location.href = '/login.html?next=/verify.html'; return; }
      setStatus('email', user.emailVerified);
      setStatus('phone', user.phoneVerified);
      document.getElementById('done').className = user.fullyVerified ? 'alert success show' : 'alert success';
    }

    const COOLDOWN_MS = 5 * 60 * 1000; // resend allowed every 5 minutes
    const verifiedState = { email: false, phone: false };
    const timers = {};

    function setStatus(channel, ok) {
      verifiedState[channel] = ok;
      const el = document.getElementById(channel + 'Status');
      el.textContent = ok ? 'Verified' : 'Pending';
      el.className = 'badge ' + (ok ? 'approved' : 'pending');
      document.getElementById(channel + 'Block').style.opacity = ok ? '0.6' : '1';

      const verifyBtn = document.getElementById('verify' + cap(channel) + 'Btn');
      const codeInput = document.getElementById(channel + 'Code');
      if (ok) {
        // Once verified, lock the section so no more codes/attempts can be sent.
        verifyBtn.disabled = true;
        codeInput.disabled = true;
        clearInterval(timers[channel]);
        const resendBtn = document.getElementById('resend' + cap(channel) + 'Btn');
        resendBtn.disabled = true;
        resendBtn.textContent = 'Verified';
      } else {
        verifyBtn.disabled = false;
        codeInput.disabled = false;
        refreshCooldown(channel);
      }
    }

    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function cooldownKey(channel) { return 'rmw-resend-' + channel; }

    function refreshCooldown(channel) {
      if (verifiedState[channel]) return;
      const resendBtn = document.getElementById('resend' + cap(channel) + 'Btn');
      clearInterval(timers[channel]);
      const tick = () => {
        const started = parseInt(localStorage.getItem(cooldownKey(channel)) || '0', 10);
        const remaining = started + COOLDOWN_MS - Date.now();
        if (remaining > 0) {
          const m = Math.floor(remaining / 60000), s = Math.floor((remaining % 60000) / 1000);
          resendBtn.disabled = true;
          resendBtn.textContent = `Resend in ${m}:${String(s).padStart(2, '0')}`;
        } else {
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend';
          clearInterval(timers[channel]);
        }
      };
      tick();
      timers[channel] = setInterval(tick, 1000);
    }

    async function verify(channel, code) {
      if (!code.trim()) { RMW.toast(alertEl, 'error', 'Enter the code first.'); return; }
      try {
        await RMW.api('/api/auth/verify', { method: 'POST', body: { channel, code: code.trim() } });
        RMW.toast(alertEl, 'success', cap(channel.toLowerCase()) + ' verified!');
        await refresh();
      } catch (err) { RMW.toast(alertEl, 'error', err.message); }
    }

    async function resend(channel) {
      const key = channel.toLowerCase();
      try {
        await RMW.api('/api/auth/verify/resend', { method: 'POST', body: { channel } });
        localStorage.setItem(cooldownKey(key), String(Date.now()));
        refreshCooldown(key);
        RMW.toast(alertEl, 'info', 'A new code was sent (check the server log in dev mode). You can resend again in 5 minutes.');
      } catch (err) { RMW.toast(alertEl, 'error', err.message); }
    }

    document.getElementById('verifyEmailBtn').addEventListener('click', () => verify('EMAIL', document.getElementById('emailCode').value));
    document.getElementById('verifyPhoneBtn').addEventListener('click', () => verify('PHONE', document.getElementById('phoneCode').value));
    document.getElementById('resendEmailBtn').addEventListener('click', () => resend('EMAIL'));
    document.getElementById('resendPhoneBtn').addEventListener('click', () => resend('PHONE'));

    refresh();
  </script>
</body>
</html>
