<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set a new password — MyWorkTea</title>
    <script>(function(){var t=localStorage.getItem("rmw-theme")||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
    <div class="container">
        <div class="card form-card">
            <h2 style="margin-top:0">Set a new password</h2>
            <p class="subtitle">Enter the code we emailed you, along with your new password.</p>
            <div id="alert" class="alert"></div>
            <form id="resetForm">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="field">
                    <label for="code">Reset code</label>
                    <input type="text" id="code" name="code" required inputmode="numeric" placeholder="6-digit code">
                </div>
                <div class="field">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="8" pattern="(?=.*[A-Za-z])(?=.*\d).*" autocomplete="new-password">
                    <div class="hint">At least 8 characters, including a letter and a number.</div>
                </div>
                <button class="btn" type="submit" style="width:100%">Reset password</button>
            </form>
            <p class="center muted" style="margin-top:16px"><a href="/forgot-password.html">Request a new code</a> · <a href="/login.html">Back to log in</a></p>
        </div>
    </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
    const presetEmail = RMW.qs('email');
    if (presetEmail) document.getElementById('email').value = presetEmail;

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertEl = document.getElementById('alert');
        const btn = e.target.querySelector('button[type="submit"]');
        RMW.clearToast(alertEl);
        RMW.setLoading(btn, true, 'Resetting…');
        try {
            await RMW.api('/api/auth/reset-password', { method: 'POST', body: {
                    email: document.getElementById('email').value.trim(),
                    code: document.getElementById('code').value.trim(),
                    newPassword: document.getElementById('newPassword').value
                }});
            RMW.toast(alertEl, 'success', 'Password reset! Redirecting to log in…');
            setTimeout(() => { window.location.href = '/login.html'; }, 1300);
        } catch (err) {
            RMW.toast(alertEl, 'error', err.message);
            RMW.setLoading(btn, false);
        }
    });
</script>
</body>
</html>
