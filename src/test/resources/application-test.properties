# In-memory profile used by the build/tests so it runs without a MySQL server.
spring.datasource.url=jdbc:h2:mem:ratemyworkplace;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.mail.enabled=false
app.ratelimit.enabled=false
app.upload.dir=./build/test-uploads
# MockMvc requests are plain HTTP; a Secure cookie would be dropped by the test client.
server.servlet.session.cookie.secure=false
