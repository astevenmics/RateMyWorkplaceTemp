# ===================================================================
# RateMyWork - default (production) configuration : MySQL
# Override any value with environment variables, e.g. DB_URL, DB_USER.
# ===================================================================
spring.application.name=RateMyWork

# ---- Datasource (MySQL) -------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ratemywork?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:ratemywork}
spring.datasource.password=${DB_PASSWORD:ratemywork}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
# Keep the persistence session open through view rendering so the REST layer can map
# lazy associations (locations, feedback authors, etc.) into DTOs safely.
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ---- File uploads (proof documents) -------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.allowed-content-types=application/pdf,image/png,image/jpeg

# ---- Mail (verification codes). Defaults to a logging "no-op". -----
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:false}
app.mail.from=${MAIL_FROM:no-reply@ratemywork.local}
app.mail.enabled=${MAIL_ENABLED:false}

# ---- Application security / bootstrap ------------------------------
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.email=${ADMIN_EMAIL:admin@ratemywork.local}

# ---- Rate limiting -------------------------------------------------
# Global request budget per client IP (token bucket, refilled per minute).
app.ratelimit.enabled=true
app.ratelimit.capacity=120
app.ratelimit.refill-tokens=120
app.ratelimit.refill-period-seconds=60
# Stricter budget for auth + write endpoints.
app.ratelimit.sensitive-capacity=15
app.ratelimit.sensitive-refill-tokens=15
app.ratelimit.sensitive-refill-period-seconds=60

# ---- Pagination ----------------------------------------------------
app.pagination.default-page-size=30
app.pagination.max-page-size=100
spring.data.web.pageable.default-page-size=30
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ---- Actuator (used by the admin stats dashboard) ------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

server.error.include-message=always
server.error.include-binding-errors=always
