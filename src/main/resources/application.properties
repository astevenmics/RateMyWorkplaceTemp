# ===================================================================
# RateMyWork - default (production) configuration : MySQL
# Override any value with environment variables, e.g. DB_URL, DB_USER.
# ===================================================================
spring.application.name=RateMyWorkplace

# ---- Datasource (MySQL) -------------------------------------------
spring.datasource.url=${DBURL}
spring.datasource.username=${DBUSER}
spring.datasource.password=${DBPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Connection pool (HikariCP) -----------------------------------
# Size the pool to the DB's capacity. Requests block waiting for a free
# connection once these are exhausted, so this caps DB concurrency.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:20000}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ---- Async executor (background email/SMS sends) ------------------
spring.task.execution.pool.core-size=${ASYNC_CORE_POOL:4}
spring.task.execution.pool.max-size=${ASYNC_MAX_POOL:16}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE:200}
spring.task.execution.thread-name-prefix=rmw-async-

# ---- JPA / Hibernate ----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
# Keep the persistence session open through view rendering so the REST layer can map
# lazy associations (locations, feedback authors, etc.) into DTOs safely.
spring.jpa.open-in-view=true
# Dialect is auto-detected from the JDBC connection (Hibernate 6+ — and the "does not need
# to be specified" warning below only fires once it's already been detected successfully);
# setting it explicitly just triggers that deprecation warning (HHH90000025) for nothing.
# NOTE: a separate, unrelated warning (HHH100045 "Could not obtain connection metadata:
# Unknown column 'RESERVED' in 'WHERE'") can show up alongside it — that one comes from a
# JDBC driver/server keyword-list query some MySQL-compatible hosts don't fully support.
# It's non-fatal (Hibernate falls back to a built-in keyword list) and safe to ignore;
# disabling `hibernate.temp.use_jdbc_metadata_defaults` to silence it is NOT safe — that
# flag also disables the metadata-based dialect auto-detection this section relies on,
# so it will fail to start ("Unable to determine Dialect without JDBC metadata") on any
# datasource that doesn't get an explicit hibernate.dialect.
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ---- File uploads (proof documents) -------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.allowed-content-types=application/pdf,image/png,image/jpeg

# ---- Mail (verification codes). Defaults to a logging "no-op". -----
spring.mail.host=${MAILHOST}
spring.mail.port=${MAILPORT}
spring.mail.username=${MAILUSER}
spring.mail.password=${MAILPASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:true}
app.mail.from=${MAIL_FROM:no-reply@ratemywork.local}
app.mail.enabled=${MAIL_ENABLED:true}

# ---- Application security / bootstrap ------------------------------
app.admin.username=${ADMINUSERNAME}
app.admin.password=${ADMINPASSWORD}
app.admin.email=${ADMINEMAIL}

# ---- Session cookie ---------------------------------------------------
# Secure requires the app to actually be served over HTTPS (directly or via a
# TLS-terminating proxy) or browsers will silently drop the session cookie.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

# ---- Rate limiting -------------------------------------------------
# Global request budget per client IP (token bucket, refilled per minute).
app.ratelimit.enabled=true
app.ratelimit.capacity=120
app.ratelimit.refill-tokens=120
app.ratelimit.refill-period-seconds=60
# Stricter budget for auth + write endpoints.
app.ratelimit.sensitive-capacity=15
app.ratelimit.sensitive-refill-tokens=15
app.ratelimit.sensitive-refill-period-seconds=60
app.ratelimit.trust-forwarded-for=false

# ---- Pagination ----------------------------------------------------
app.pagination.default-page-size=30
app.pagination.max-page-size=100
spring.data.web.pageable.default-page-size=30
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ---- Analytics -----------------------------------------------------
# Traffic counters are buffered in memory and flushed to the DB on this
# interval (ms), keeping per-request page-view/login/signup writes off the
# request path and out of the hot daily-row lock.
app.analytics.flush-interval-ms=${ANALYTICS_FLUSH_MS:30000}

# ---- Actuator (used by the admin stats dashboard) ------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# API errors are handled (and rendered with a safe message) by GlobalExceptionHandler.
# These only govern the fallback error path (e.g. an exception thrown before a
# controller method runs) and are kept minimal so internal details never leak.
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never

# Don't persist/reload HTTP sessions across restarts. Avoids Tomcat trying to
# deserialize stale session state (e.g. SPRING_SECURITY_CONTEXT) from a previous
# run — which fails noisily after a code change or devtools restart.
server.servlet.session.persistent=false