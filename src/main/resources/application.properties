#spring.datasource.password=MbvnKiLf=A00gDiX@EfOlaOM
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Connection pool (HikariCP) -----------------------------------
# Size the pool to the DB's capacity. Requests block waiting for a free
# connection once these are exhausted, so this caps DB concurrency.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:20000}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ---- Async executor (background email/SMS sends) ------------------
spring.task.execution.pool.core-size=${ASYNC_CORE_POOL:4}
spring.task.execution.pool.max-size=${ASYNC_MAX_POOL:16}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE:200}
spring.task.execution.thread-name-prefix=rmw-async-

# ---- JPA / Hibernate ----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
# Keep the persistence session open through view rendering so the REST layer can map
# lazy associations (locations, feedback authors, etc.) into DTOs safely.
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ---- File uploads (proof documents) -------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.allowed-content-types=application/pdf,image/png,image/jpeg

# ---- Mail (verification codes). Defaults to a logging "no-op". -----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:guidelines.fb@gmail.com}
spring.mail.password=${MAIL_PASSWORD:qzboroozaowaeokv}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:true}
app.mail.from=${MAIL_FROM:no-reply@ratemywork.local}
app.mail.enabled=${MAIL_ENABLED:true}

# ---- Application security / bootstrap ------------------------------
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.email=${ADMIN_EMAIL:admin@ratemywork.local}

# ---- Rate limiting -------------------------------------------------
# Global request budget per client IP (token bucket, refilled per minute).
app.ratelimit.enabled=true
app.ratelimit.capacity=120
app.ratelimit.refill-tokens=120
app.ratelimit.refill-period-seconds=60
# Stricter budget for auth + write endpoints.
app.ratelimit.sensitive-capacity=15
app.ratelimit.sensitive-refill-tokens=15
app.ratelimit.sensitive-refill-period-seconds=60

# ---- Pagination ----------------------------------------------------
app.pagination.default-page-size=30
app.pagination.max-page-size=100
spring.data.web.pageable.default-page-size=30
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ---- Analytics -----------------------------------------------------
# Traffic counters are buffered in memory and flushed to the DB on this
# interval (ms), keeping per-request page-view/login/signup writes off the
# request path and out of the hot daily-row lock.
app.analytics.flush-interval-ms=${ANALYTICS_FLUSH_MS:30000}

# ---- Actuator (used by the admin stats dashboard) ------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Don't persist/reload HTTP sessions across restarts. Avoids Tomcat trying to
# deserialize stale session state (e.g. SPRING_SECURITY_CONTEXT) from a previous
# run — which fails noisily after a code change or devtools restart.
server.servlet.session.persistent=false