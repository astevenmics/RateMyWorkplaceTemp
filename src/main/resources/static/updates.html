<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's new — RateMyWorkplace</title>
    <script>(function(){var t=localStorage.getItem('rmw-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
    <div class="container">
        <h2 style="margin-top:0">What's new</h2>
        <p class="subtitle">Product updates and announcements from the RateMyWorkplace team. Click a post to read the details.</p>
        <div id="updatesList"><div class="spinner">Loading…</div></div>
        <div class="pagination" id="pagination"></div>
    </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
    let page = 0;
    async function load() {
        const box = document.getElementById('updatesList');
        box.innerHTML = '<div class="spinner">Loading…</div>';
        try {
            const data = await RMW.api(`/api/site/updates?page=${page}&size=15`);
            const items = data.content || [];
            if (!items.length) { box.innerHTML = '<p class="muted">No updates yet.</p>'; document.getElementById('pagination').innerHTML=''; return; }
            // Only title + date are shown in the list; the post page has the details.
            box.innerHTML = items.map(u => `
          <a class="update-list-item" href="/update.html?id=${u.id}">
            <span class="t">${RMW.escapeHtml(u.title)}${u.tag ? ` <span class="tag">${RMW.escapeHtml(u.tag)}</span>` : ''}</span>
            <span class="d">${RMW.fmtDate(u.createdAt)}</span>
          </a>`).join('');
            renderPagination(data);
        } catch (e) {
            box.innerHTML = `<p class="muted">${RMW.escapeHtml(e.message)}</p>`;
        }
    }
    function renderPagination(data) {
        const pag = document.getElementById('pagination');
        const total = data.page.totalPages, cur = data.page.number;
        if (total <= 1) { pag.innerHTML = ''; return; }
        let html = `<button ${cur===0?'disabled':''} data-p="${cur-1}">‹ Prev</button>`;
        for (let i = 0; i < total; i++) html += `<button class="${i===cur?'active':''}" data-p="${i}">${i+1}</button>`;
        html += `<button ${cur>=total-1?'disabled':''} data-p="${cur+1}">Next ›</button>`;
        pag.innerHTML = html;
        pag.querySelectorAll('button[data-p]').forEach(b => b.addEventListener('click', () => { page = parseInt(b.dataset.p,10); window.scrollTo({top:0,behavior:'smooth'}); load(); }));
    }
    load();
</script>
</body>
</html>
