<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — RateMyWorkplace</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
  <div class="container">
    <div class="card form-card">
      <h2 style="margin-top:0">Create your account</h2>
      <p class="subtitle">You'll verify your email and phone next. Both are required before posting.</p>
      <div id="alert" class="alert"></div>
      <form id="registerForm">
        <div class="field">
          <label for="displayName">Display name</label>
          <input type="text" id="displayName" name="displayName" required maxlength="80">
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required pattern="[A-Za-z0-9_.]{3,40}">
          <div class="hint">3–40 characters: letters, digits, underscore or dot.</div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="phoneNumber">Phone number</label>
          <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="+1 555 123 4567">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
          <div class="hint">At least 8 characters.</div>
        </div>
        <button class="btn" type="submit" style="width:100%">Create account</button>
      </form>
      <p class="center muted" style="margin-top:16px">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    RMW.clearToast(alertEl);
    RMW.setLoading(submitBtn, true, 'Creating account…');
    const payload = {
      displayName: document.getElementById('displayName').value.trim(),
      username: document.getElementById('username').value.trim(),
      email: document.getElementById('email').value.trim(),
      phoneNumber: document.getElementById('phoneNumber').value.trim(),
      password: document.getElementById('password').value
    };
    try {
      await RMW.api('/api/auth/register', { method: 'POST', body: payload });
      // auto login then go to verification
      await RMW.login(payload.username, payload.password);
      window.location.href = '/verify.html';
      // Keep the button disabled while we navigate away.
    } catch (err) {
      let msg = err.message;
      if (err.data && err.data.fieldErrors) {
        msg = Object.values(err.data.fieldErrors).join(' ');
      }
      RMW.toast(alertEl, 'error', msg);
      RMW.setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
