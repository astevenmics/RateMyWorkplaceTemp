<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workplace — RateMyWorkplace</title>
  <script>(function(){var t=localStorage.getItem("rmw-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <!-- Google AdSense: replace data-ad-client / data-ad-slot with your own IDs and uncomment.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  -->
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
  <div class="container">
    <div id="loadingState" class="spinner">Loading workplace…</div>

    <div id="content" class="hidden">
      <div class="detail-head">
        <div class="info">
          <p><a href="/workplaces.html" class="pill-link">← Back to browse</a></p>
          <h1 id="companyName" style="margin:8px 0 6px"></h1>
          <div class="rating-line" style="margin-bottom:10px">
            <span id="companyStars"></span>
            <span class="score" id="companyScore"></span>
            <span class="count" id="companyCount"></span>
          </div>
          <div class="tags" id="companyTags" style="margin-bottom:12px"></div>
          <p id="companyDesc" class="muted"></p>
          <p id="companyWebsite"></p>
        </div>
      </div>

      <div class="layout-2col" style="margin-top:24px">
        <div>
          <div class="card" style="margin-bottom:20px">
            <h3 style="margin-top:0">Locations</h3>
            <div class="field">
              <label for="locationSelect">Viewing feedback for</label>
              <select id="locationSelect"></select>
            </div>
            <div id="locationMeta" class="muted"></div>
          </div>

          <div class="card" id="reviewBox" style="margin-bottom:20px">
            <h3 style="margin-top:0">Leave feedback</h3>
            <div id="eligibilityNote" class="alert info show"></div>
            <div id="reviewFormWrap" class="hidden">
              <div id="reviewAlert" class="alert"></div>
              <form id="reviewForm">
                <div class="field">
                  <label>Your rating</label>
                  <div class="star-input">
                    <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                    <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                    <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                    <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                    <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                  </div>
                </div>
                <div class="field"><label>Title</label><input type="text" name="title" maxlength="140" placeholder="Summarise your experience"></div>
                <div class="field"><label>Your feedback</label><textarea name="body" rows="5" required maxlength="4000" placeholder="What was it really like to work here?"></textarea></div>
                <button class="btn" type="submit">Post feedback</button>
              </form>
            </div>
          </div>

          <h3>Employee feedback</h3>
          <div id="feedbackList"><div class="spinner">Loading…</div></div>
          <div class="pagination" id="feedbackPagination"></div>
        </div>

        <aside>
          <!-- Reserved Google AdSense slot -->
          <div class="ad-slot">
            <div>
              <strong>Advertisement</strong><br>
              Google AdSense slot<br><span style="font-size:.78rem">(728×90 / responsive)</span>
              <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXX" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
              <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
            </div>
          </div>
          <div class="card" style="margin-top:18px">
            <h3 style="margin-top:0">Work here?</h3>
            <p class="muted" style="font-size:.9rem">Verify your employment to share your own feedback for this company.</p>
            <a class="btn secondary small" id="proofLink" href="/submit-proof.html">Verify employment</a>
          </div>
        </aside>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
  const companyId = RMW.qs('id');
  const preselectLocationId = RMW.qs('locationId');
  let company = null;
  let fbState = { page: 0, size: 10 };

  if (!companyId) { window.location.href = '/workplaces.html'; }

  async function init() {
    try {
      company = await RMW.api('/api/companies/' + companyId);
    } catch (e) {
      document.getElementById('loadingState').textContent = 'Workplace not found.';
      return;
    }
    render();
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    loadFeedback();
    refreshEligibility();
  }

  function render() {
    document.title = company.name + ' — RateMyWorkplace';
    document.getElementById('companyName').textContent = company.name;
    document.getElementById('companyStars').innerHTML = RMW.stars(company.averageRating);
    document.getElementById('companyScore').textContent = company.averageRating.toFixed(1);
    document.getElementById('companyCount').textContent = `(${company.ratingCount} review${company.ratingCount === 1 ? '' : 's'})`;
    document.getElementById('companyTags').innerHTML =
            (company.categories || []).map(c => `<span class="tag">${RMW.escapeHtml(c.name)}</span>`).join('');
    document.getElementById('companyDesc').textContent = company.description || '';
    if (company.website) {
      document.getElementById('companyWebsite').innerHTML =
              `<a href="${RMW.escapeHtml(company.website)}" target="_blank" rel="noopener">${RMW.escapeHtml(company.website)}</a>`;
    }
    document.getElementById('proofLink').href = '/submit-proof.html?companyId=' + company.id;

    const sel = document.getElementById('locationSelect');
    sel.innerHTML = company.locations.map(l =>
            `<option value="${l.id}">${RMW.escapeHtml(locLabel(l))} — ★ ${l.averageRating.toFixed(1)} (${l.ratingCount})</option>`).join('');
    if (preselectLocationId && company.locations.some(l => String(l.id) === preselectLocationId)) {
      sel.value = preselectLocationId;
    }
    sel.addEventListener('change', () => { fbState.page = 0; loadFeedback(); refreshEligibility(); updateLocationMeta(); });
    updateLocationMeta();
  }

  function locLabel(l) {
    let s = l.label ? l.label + ' — ' : '';
    s += [l.addressLine, l.city, l.state, l.zipCode].filter(Boolean).join(', ');
    return s;
  }

  function updateLocationMeta() {
    const l = currentLocation();
    const meta = document.getElementById('locationMeta');
    if (!l) { meta.innerHTML = ''; return; }
    const depts = (l.departments || []).map(d => `<span class="tag muted">${RMW.escapeHtml(d)}</span>`).join('');
    meta.innerHTML = RMW.escapeHtml(locLabel(l)) + (depts ? `<div class="tags" style="margin-top:6px">${depts}</div>` : '');
  }

  function currentLocation() {
    const id = parseInt(document.getElementById('locationSelect').value, 10);
    return company.locations.find(l => l.id === id);
  }

  async function loadFeedback() {
    const l = currentLocation();
    const list = document.getElementById('feedbackList');
    list.innerHTML = '<div class="spinner">Loading…</div>';
    try {
      const data = await RMW.api(`/api/feedback/location/${l.id}?page=${fbState.page}&size=${fbState.size}&sort=createdAt,desc`);
      const items = data.content || [];
      if (!items.length) { list.innerHTML = '<p class="muted">No feedback yet for this location.</p>'; document.getElementById('feedbackPagination').innerHTML=''; return; }
      list.innerHTML = items.map(f => `
          <div class="feedback-item">
            <div class="head">
              <span class="author">${RMW.escapeHtml(f.authorDisplayName)}</span>
              <span class="date">${RMW.fmtDate(f.createdAt)}</span>
            </div>
            <div class="rating-line">${RMW.stars(f.rating)} ${f.title ? '<strong>' + RMW.escapeHtml(f.title) + '</strong>' : ''}</div>
            <p>${RMW.escapeHtml(f.body)}</p>
          </div>`).join('');
      renderFbPagination(data);
    } catch (e) {
      list.innerHTML = '<p class="muted">Could not load feedback.</p>';
    }
  }

  function renderFbPagination(data) {
    const pag = document.getElementById('feedbackPagination');
    const totalPages = data.page.totalPages, current = data.page.number;
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button ${current===0?'disabled':''} data-p="${current-1}">‹</button>`;
    for (let i = 0; i < totalPages; i++) html += `<button class="${i===current?'active':''}" data-p="${i}">${i+1}</button>`;
    html += `<button ${current>=totalPages-1?'disabled':''} data-p="${current+1}">›</button>`;
    pag.innerHTML = html;
    pag.querySelectorAll('button[data-p]').forEach(b => b.addEventListener('click', () => { fbState.page = parseInt(b.dataset.p,10); loadFeedback(); }));
  }

  async function refreshEligibility() {
    const l = currentLocation();
    const note = document.getElementById('eligibilityNote');
    const wrap = document.getElementById('reviewFormWrap');
    let info;
    try { info = await RMW.api('/api/feedback/eligibility/' + l.id); } catch (e) { info = { authenticated: false }; }

    if (!info.authenticated) {
      wrap.classList.add('hidden');
      note.className = 'alert info show';
      note.innerHTML = '<a href="/login.html">Log in</a> and verify your employment to leave feedback.';
    } else if (!info.verified) {
      wrap.classList.add('hidden');
      note.className = 'alert warn show';
      note.innerHTML = 'Verify your email and phone on your <a href="/profile.html">profile</a> before posting feedback.';
    } else if (!info.hasApprovedProof) {
      wrap.classList.add('hidden');
      note.className = 'alert warn show';
      note.innerHTML = `You need an approved employment proof for this location.
          <a href="/submit-proof.html?companyId=${company.id}&locationId=${l.id}">Submit proof →</a>`;
    } else {
      note.className = 'alert success show';
      note.textContent = 'You are verified to leave feedback for this location.';
      wrap.classList.remove('hidden');
    }
  }

  document.getElementById('reviewForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    const alertEl = document.getElementById('reviewAlert');
    const rating = fd.get('rating');
    if (!rating) { RMW.toast(alertEl, 'error', 'Please choose a star rating.'); return; }
    try {
      await RMW.api('/api/feedback', { method: 'POST', body: {
          locationId: currentLocation().id,
          rating: parseInt(rating, 10),
          title: fd.get('title') || null,
          body: fd.get('body')
        }});
      RMW.toast(alertEl, 'success', 'Thanks! Your feedback was posted.');
      form.reset();
      company = await RMW.api('/api/companies/' + companyId);
      render();
      fbState.page = 0; loadFeedback();
    } catch (err) {
      RMW.toast(alertEl, 'error', err.message);
    }
  });

  init();
</script>
</body>
</html>
