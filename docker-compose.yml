
services:
  app:
    image: ghcr.io/astevenmics/ratemyworkplacetemp:latest
    container_name: myworktea-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DBURL: jdbc:postgresql://db:5432/myworktea
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  db:
    image: postgres:16-alpine
    container_name: myworktea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: myworktea
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DBUSER} -d myworktea"]
      interval: 10s
      timeout: 5s
      retries: 6

  caddy:
    image: caddy:2-alpine
    container_name: myworktea-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  uploads:
  caddy-data:
  caddy-config:
