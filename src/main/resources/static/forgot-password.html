<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — RateMyWorkplace</title>
  <script>(function(){var t=localStorage.getItem('rmw-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <section class="section">
    <div class="container">
      <div class="card form-card">
        <h2 style="margin-top:0">Reset your password</h2>
        <p class="subtitle">Enter your email and we'll send you a reset code. (In dev mode, the code is printed to the server log.)</p>
        <div id="alert" class="alert"></div>
        <form id="forgotForm">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          <button class="btn" type="submit" style="width:100%">Send reset code</button>
        </form>
        <p class="center muted" style="margin-top:16px">Remembered it? <a href="/login.html">Back to log in</a></p>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      const btn = e.target.querySelector('button[type="submit"]');
      const email = document.getElementById('email').value.trim();
      RMW.clearToast(alertEl);
      RMW.setLoading(btn, true, 'Sending…');
      try {
        await RMW.api('/api/auth/forgot-password', { method: 'POST', body: { email } });
        RMW.toast(alertEl, 'success', 'If an account exists for that email, a reset code has been sent.');
        setTimeout(() => { window.location.href = '/reset-password.html?email=' + encodeURIComponent(email); }, 1200);
      } catch (err) {
        RMW.toast(alertEl, 'error', err.message);
        RMW.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
