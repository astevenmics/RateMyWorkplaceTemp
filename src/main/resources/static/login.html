<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — RateMyWorkplace</title>
  <script>(function(){var t=localStorage.getItem("rmw-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="section">
  <div class="container">
    <div class="card form-card">
      <h2 style="margin-top:0">Welcome back</h2>
      <p class="subtitle">Log in to manage your profile, verify employment and post feedback.</p>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <div class="field">
          <label for="username">Username or email</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit" style="width:100%">Log in</button>
      </form>
      <p class="center" style="margin-top:14px"><a href="/forgot-password.html">Forgot your password?</a></p>
      <p class="center muted" style="margin-top:6px">No account? <a href="/register.html">Create one</a></p>
    </div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/app.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    RMW.clearToast(alertEl);
    RMW.setLoading(submitBtn, true, 'Logging in…');
    try {
      await RMW.login(document.getElementById('username').value.trim(), document.getElementById('password').value);
      const next = RMW.qs('next') || '/index.html';
      window.location.href = next;
      // Leave the button in its loading state while we navigate away.
    } catch (err) {
      RMW.toast(alertEl, 'error', err.message || 'Login failed');
      RMW.setLoading(submitBtn, false);
    }
  });
</script>
</body>
</html>
